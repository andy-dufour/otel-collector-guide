# =============================================================================
# OTel Collector Tier 2 Regional Gateway -- Production Configuration
# =============================================================================
#
# Referenced from: Chapter 04 -- Tiered Gateways
#
# Purpose:
#   This config runs as a Tier 2 regional gateway that performs centralized
#   processing on traces. In a tiered architecture:
#     Tier 1 (agents) -> Tier 2 (regional gateways) -> backend
#   Regional gateways aggregate telemetry from multiple clusters in the same
#   region, apply transforms and filtering, and forward to the backend.
#
# Prerequisites:
#   - OTel Collector deployed as a Deployment (3+ replicas)
#   - Container resource limits: 2Gi memory, 2 CPU
#   - Environment variables: HONEYCOMB_API_KEY, OTEL_REGION
#
# Note on sampling:
#   This config does NOT use tail sampling. While the tail_sampling processor
#   exists in the OTel Collector, it is not recommended for production due to
#   stability concerns and complex scaling requirements (all spans for a trace
#   must reach the same instance). For sampling, prefer head-based sampling
#   at the SDK level using the `parentbased_traceidratio` sampler, or use the
#   `probabilistic_sampler` processor for simple probabilistic sampling.
#
# Required Collector distribution: contrib (for transform)
# =============================================================================

receivers:
  # ---------------------------------------------------------------------------
  # OTLP receiver: accept telemetry from Tier 1 agents/gateways
  # ---------------------------------------------------------------------------
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        # Keepalive settings prevent idle connections from being silently
        # dropped by intermediate load balancers (AWS NLB, GCP ILB, etc.).
        keepalive:
          server_parameters:
            # Send keepalive ping every 30s on idle connections.
            time: 30s
            # Wait 5s for keepalive ack before considering connection dead.
            timeout: 5s
          enforcement_policy:
            # Allow clients to send pings even without active RPCs.
            permit_without_stream: true
            # Minimum time between client pings. Prevents aggressive clients
            # from overloading the server with keepalive traffic.
            min_time: 10s
      http:
        endpoint: 0.0.0.0:4318

processors:
  # ===========================================================================
  # PROCESSOR ORDERING WARNING:
  # memory_limiter MUST be first. Transform runs to normalize attributes.
  # batch MUST be last.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Memory limiter: backpressure valve
  # ---------------------------------------------------------------------------
  # Formula: limit_mib = container_limit(2Gi=2048) * 0.80 = 1638
  #          spike_limit_mib = container_limit(2Gi=2048) * 0.20 = 409
  memory_limiter:
    limit_mib: 1638
    spike_limit_mib: 409
    check_interval: 1s

  # ---------------------------------------------------------------------------
  # Transform: normalize attributes
  # ---------------------------------------------------------------------------
  # Normalization ensures consistent attribute names regardless of SDK version.
  transform/normalize:
    trace_statements:
      - context: span
        statements:
          # Migrate HTTP status code from old to new semconv.
          - set(attributes["http.response.status_code"], attributes["http.status_code"])
            where attributes["http.status_code"] != nil and attributes["http.response.status_code"] == nil

          # Truncate excessively long attribute values.
          - truncate_all(attributes, 10000)

      - context: resource
        statements:
          # Stamp the region on all telemetry passing through this gateway.
          - set(attributes["cloud.region"], "${env:OTEL_REGION}")
            where attributes["cloud.region"] == nil

  # ---------------------------------------------------------------------------
  # Batch: group traces for efficient export
  # ---------------------------------------------------------------------------
  batch:
    send_batch_size: 4096
    send_batch_max_size: 8192
    timeout: 2s

exporters:
  # ---------------------------------------------------------------------------
  # OTLP exporter: send telemetry to Honeycomb
  # ---------------------------------------------------------------------------
  otlp/honeycomb:
    endpoint: api.honeycomb.io:443
    headers:
      x-honeycomb-team: ${env:HONEYCOMB_API_KEY}
    compression: zstd
    sending_queue:
      enabled: true
      queue_size: 10000
      num_consumers: 10
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  zpages:
    endpoint: localhost:55679

  pprof:
    endpoint: localhost:1777

service:
  extensions: [health_check, zpages, pprof]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, transform/normalize, batch]
      exporters: [otlp/honeycomb]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/honeycomb]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/honeycomb]

  telemetry:
    metrics:
      address: 0.0.0.0:8888
    logs:
      level: info
